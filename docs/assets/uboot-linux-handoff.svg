<svg width="760" height="900" viewBox="0 0 760 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="uboot-handoff-title uboot-handoff-desc">
  <title id="uboot-handoff-title">U-Boot to Linux handoff</title>
  <desc id="uboot-handoff-desc">A vertical U-Boot handoff diagram showing SPL, U-Boot proper, payload artifacts, boot command, and Linux entry evidence.</desc>
  <style>
    .stage { fill: #f6f8fa; stroke: #57606a; stroke-width: 1.2; rx: 6; }
    .payload { fill: #ddf4ff; stroke: #0969da; stroke-width: 1.1; rx: 6; }
    .risk { fill: #fff8c5; stroke: #9a6700; stroke-width: 1.1; rx: 6; }
    .title { font: 600 13px sans-serif; fill: #24292f; }
    .body { font: 11px sans-serif; fill: #57606a; }
    .small { font: 10px sans-serif; fill: #57606a; }
    .arrow { stroke: #0969da; stroke-width: 2; marker-end: url(#arrowhead); }
    .side { stroke: #9a6700; stroke-width: 1.5; stroke-dasharray: 4 4; marker-end: url(#sidehead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#0969da" />
    </marker>
    <marker id="sidehead" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#9a6700" />
    </marker>
  </defs>

  <text class="title" x="380" y="28" text-anchor="middle">U-Boot to Linux handoff</text>
  <text class="body" x="380" y="48" text-anchor="middle">The bootloader succeeds only when Linux receives the exact payload it expects.</text>

  <rect class="stage" x="80" y="76" width="300" height="58"/>
  <text class="title" x="230" y="100" text-anchor="middle">Boot ROM</text>
  <text class="body" x="230" y="118" text-anchor="middle">loads the first bootloader image</text>
  <line class="arrow" x1="230" y1="134" x2="230" y2="160"/>

  <rect class="stage" x="80" y="160" width="300" height="64"/>
  <text class="title" x="230" y="185" text-anchor="middle">SPL / TPL</text>
  <text class="body" x="230" y="203" text-anchor="middle">minimal clocks, pinmux, DRAM, load U-Boot</text>
  <line class="arrow" x1="230" y1="224" x2="230" y2="250"/>

  <rect class="stage" x="80" y="250" width="300" height="64"/>
  <text class="title" x="230" y="275" text-anchor="middle">U-Boot proper</text>
  <text class="body" x="230" y="293" text-anchor="middle">commands, environment, driver model</text>
  <line class="side" x1="380" y1="282" x2="444" y2="282"/>
  <rect class="risk" x="444" y="258" width="236" height="48"/>
  <text class="title" x="562" y="278" text-anchor="middle">Evidence</text>
  <text class="body" x="562" y="295" text-anchor="middle">banner, prompt, printenv, bdinfo</text>
  <line class="arrow" x1="230" y1="314" x2="230" y2="340"/>

  <rect class="payload" x="80" y="340" width="300" height="68"/>
  <text class="title" x="230" y="364" text-anchor="middle">Load Linux Image</text>
  <text class="body" x="230" y="382" text-anchor="middle">path, size, image format, load address</text>
  <text class="small" x="230" y="398" text-anchor="middle">Wrong address can fail before kernel logs.</text>
  <line class="arrow" x1="230" y1="408" x2="230" y2="434"/>

  <rect class="payload" x="80" y="434" width="300" height="68"/>
  <text class="title" x="230" y="458" text-anchor="middle">Load DTB</text>
  <text class="body" x="230" y="476" text-anchor="middle">model, compatible, chosen, aliases</text>
  <text class="small" x="230" y="492" text-anchor="middle">Wrong DTB can hide the console or devices.</text>
  <line class="arrow" x1="230" y1="502" x2="230" y2="528"/>

  <rect class="payload" x="80" y="528" width="300" height="68"/>
  <text class="title" x="230" y="552" text-anchor="middle">Load initramfs</text>
  <text class="body" x="230" y="570" text-anchor="middle">optional rootfs payload and address</text>
  <text class="small" x="230" y="586" text-anchor="middle">Wrong ramdisk causes init or rootfs failures.</text>
  <line class="arrow" x1="230" y1="596" x2="230" y2="622"/>

  <rect class="payload" x="80" y="622" width="300" height="68"/>
  <text class="title" x="230" y="646" text-anchor="middle">Construct bootargs</text>
  <text class="body" x="230" y="664" text-anchor="middle">console, earlycon, root, rootwait, debug flags</text>
  <text class="small" x="230" y="680" text-anchor="middle">Environment policy can change Linux behavior.</text>
  <line class="side" x1="380" y1="656" x2="444" y2="656"/>
  <rect class="risk" x="444" y="632" width="236" height="48"/>
  <text class="title" x="562" y="652" text-anchor="middle">Check</text>
  <text class="body" x="562" y="669" text-anchor="middle">printenv bootargs, fdt /chosen</text>
  <line class="arrow" x1="230" y1="690" x2="230" y2="716"/>

  <rect class="stage" x="80" y="716" width="300" height="58"/>
  <text class="title" x="230" y="740" text-anchor="middle">booti / bootm / EFI boot</text>
  <text class="body" x="230" y="758" text-anchor="middle">jump to Linux with Image, DTB, bootargs</text>
  <line class="arrow" x1="230" y1="774" x2="230" y2="800"/>

  <rect class="stage" x="80" y="800" width="300" height="58"/>
  <text class="title" x="230" y="824" text-anchor="middle">Linux kernel entry</text>
  <text class="body" x="230" y="842" text-anchor="middle">early console proves the handoff worked</text>
  <line class="side" x1="380" y1="829" x2="444" y2="829"/>
  <rect class="risk" x="444" y="805" width="236" height="48"/>
  <text class="title" x="562" y="825" text-anchor="middle">Evidence</text>
  <text class="body" x="562" y="842" text-anchor="middle">kernel banner, /proc/cmdline</text>
</svg>
